name: CI

# Deterministic proof the pipeline holds together — runs on every push/PR with
# no API key and no `claude` CLI. The LLM build phase is skipped (--no-build);
# CI verifies the committed smoke artifacts (C1–C5) plus the R1–R9 regression
# guards (body-hash idempotence, installer, factory, citation floor, …).
#
# The full end-to-end run that actually drives `claude -p` (extract → ingest →
# query, and the newcomer onboarding eval) is scripts/smoke-all.sh /
# scripts/eval-onboarding.sh — run locally where the agentic tool is installed.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke:
    name: smoke + regression guards (no LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          bash --version | head -1
          openssl version
          python3 --version
      - name: Run 14 deterministic checks
        run: bash scripts/smoke-all.sh --no-build

  quality:
    name: shell + duplication quality gate
    # fallow-equivalent gate for a shell+markdown repo (fallow itself is TS/JS-
    # or Python-only and sees nothing here). shellcheck + jscpd; no LLM, no key.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (error severity)
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
      - name: Duplication + dead-script scan
        run: bash scripts/quality.sh --ci
